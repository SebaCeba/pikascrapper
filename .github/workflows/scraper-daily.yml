name: Daily TCG Scraper

on:
  schedule:
    # Ejecuta diariamente a las 8:00 AM Chile (11:00 UTC aprox)
    - cron: '0 11 * * *'
  
  # Permite ejecución manual desde GitHub Actions tab
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Keyword to search (default: pikachu)'
        required: false
        default: 'pikachu'

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    
    # Permisos necesarios para el workflow
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: � Install Node dependencies
        run: npm ci
      
      - name: 🌐 Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome
      
      - name: 🕷️ Run scraper (Direct Supabase Upload)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_TABLE: ${{ secrets.SUPABASE_TABLE }}
        run: |
          KEYWORD="${{ github.event.inputs.keyword || 'pikachu' }}"
          echo "🔍 Scraping keyword: $KEYWORD"
          node scripts/scraper.js "$KEYWORD"
      
      - name: 📧 Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Scraper Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `El scraping diario falló en el workflow run #${context.runNumber}.\n\n**Run URL**: ${context.payload.repository.html_url}/actions/runs/${context.runId}\n\n**Timestamp**: ${new Date().toISOString()}\n\nRevisa los logs para más detalles.`,
              labels: ['scraper-failure', 'automated']
            })
